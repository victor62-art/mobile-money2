openapi: 3.0.3
info:
  title: Mobile Money Bridge API
  description: API for bridging mobile money providers with the Stellar network.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server
paths:
  /v1/transactions/deposit:
    post:
      summary: Deposit funds from mobile money
      operationId: deposit
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid input or limit exceeded
  /v1/transactions/withdraw:
    post:
      summary: Withdraw funds to mobile money
      operationId: withdraw
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
  /v1/transactions/{id}:
    get:
      summary: Get transaction status
      operationId: getTransaction
      tags:
        - Transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetail'

  /v1/transactions:
    get:
      summary: List transactions (supports cursor and offset pagination)
      operationId: listTransactions
      tags:
        - Transactions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: before
          in: query
          description: >-
            Cursor to fetch records newer than the cursor. Keyset cursor encoded as
            base64("<createdAt ISO 8601>|<id>"). Use with `limit` to page backwards.
          schema:
            type: string
        - name: after
          in: query
          description: >-
            Cursor to fetch records older than the cursor. Keyset cursor encoded as
            base64("<createdAt ISO 8601>|<id>"). Use with `limit` to page forwards.
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionDetail'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
                      before:
                        type: string
                      after:
                        type: string
                      hasMore:
                        type: boolean

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionRequest:
      type: object
      required:
        - amount
        - phoneNumber
        - provider
        - stellarAddress
        - userId
      properties:
        amount:
          type: number
        phoneNumber:
          type: string
        provider:
          type: string
          enum: [mtn, airtel, orange]
        stellarAddress:
          type: string
        userId:
          type: string
        notes:
          type: string
    TransactionResponse:
      type: object
      properties:
        transactionId:
          type: string
        referenceNumber:
          type: string
        status:
          type: string
        jobId:
          type: string
    TransactionDetail:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
